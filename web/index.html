<!DOCTYPE html>
<html>
<head>

<title>Quotes Chatbot</title>

<style>

body{
font-family: Arial;
background: linear-gradient(to right,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#chatbox{
width:400px;
background:white;
border-radius:15px;
box-shadow:0px 5px 20px rgba(0,0,0,0.3);
overflow:hidden;
}

#header{
background:#4a47a3;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

#chat{
height:300px;
overflow-y:auto;
padding:10px;
background:#f5f5f5;

display:flex;
flex-direction:column;
}

/* USER MESSAGE (RIGHT SIDE) */
.user{
background:#6c63ff;
color:white;
padding:8px 12px;
border-radius:15px;
margin:5px;
max-width:70%;
align-self:flex-end;
}

/* BOT MESSAGE (LEFT SIDE) */
.bot{
background:#e0e0e0;
padding:8px 12px;
border-radius:15px;
margin:5px;
max-width:70%;
align-self:flex-start;
}

#inputArea{
display:flex;
border-top:1px solid #ddd;
}

#msg{
flex:1;
border:none;
padding:12px;
font-size:14px;
outline:none;
}

button{
background:#6c63ff;
color:white;
border:none;
padding:12px 18px;
cursor:pointer;
}

button:hover{
background:#574fd6;
}

</style>

</head>

<body>

<div id="chatbox">

<div id="header">
💬 Quotes Chatbot
</div>

<div id="chat"></div>

<div id="inputArea">
<input id="msg" placeholder="Type your message...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

async function send(){

let message=document.getElementById("msg").value;

if(message==="") return;

document.getElementById("chat").innerHTML+=
"<div class='user'>"+message+"</div>";

document.getElementById("msg").value="";

let response=await fetch("http://localhost:5005/webhooks/rest/webhook",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
sender:"user",
message:message
})
});

let data=await response.json();

document.getElementById("chat").innerHTML+=
"<div class='bot'>"+data[0].text+"</div>";

document.getElementById("chat").scrollTop=
document.getElementById("chat").scrollHeight;

}

</script>

</body>
</html>
